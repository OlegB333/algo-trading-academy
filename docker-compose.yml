---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:2026.3
    restart: unless-stopped
    container_name: freqtrade
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Default: webserver mode — FreqUI с бэктестом и визуализацией (модули 1-5)
    # Для торговли (dry-run/live) используй docker-compose.override.yml (модули 6-7)
    command: >
      webserver
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --config /freqtrade/user_data/config/config.json

