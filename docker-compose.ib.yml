# Freqtrade + Interactive Brokers — Multi-Asset Trading
# =====================================================

services:
  # IB Gateway — headless TWS bridge
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      - READ_ONLY_API=no
      - VNC_SERVER_PASSWORD=algotrading
    ports:
      - "4003:4003"   # Live trading (socat internal proxy)
      - "4004:4004"   # Paper trading (socat internal proxy)
      - "5900:5900"   # VNC (debug only)
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/4001' 2>/dev/null || bash -c '</dev/tcp/localhost/4002' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Freqtrade with IB addon
  freqtrade:
    build:
      context: ./ib_addon
      dockerfile: Dockerfile
    container_name: freqtrade-ib
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "8080:8080"   # FreqUI
    depends_on:
      ib-gateway:
        condition: service_healthy
    # Default: Webserver mode. Override with:
    #   docker-compose.override.yml for live trading
    command: >
      webserver
      --config /freqtrade/user_data/config/config_forex.json
